esphome:
  name: desk-buddy-esp-s3-box-3
  friendly_name: Desk Buddy
  includes:
    - Components/DeskBuddy/States
    - Components/DeskBuddy/Utilities
  platformio_options:
    build_flags:
      - -IComponents/DeskBuddy
      - -IComponents/DeskBuddy/Utilities
      - -IComponents/DeskBuddy/States
  on_boot:
    priority: -100
    then:
      - lambda: |-
          id(MyDeskBuddy)->setHappinessMeter(id(happiness_meter));
          id(MyDeskBuddy)->setDisplay(id(s3_box_lcd));
      - delay: 1s
      - script.execute: blink_animation
      - script.execute: horizontal_move_animation

external_components:
  - source: Components

esp32:
  board: esp32s3box
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"

psram:
  mode: octal
  speed: 80MHz

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

ota:
  platform: esphome

api:
  services:
    - service: add_happiness
      variables:
        change_by: float
      then:
        - lambda: |-
            id(MyDeskBuddy).addHappiness(change_by);

logger:
  level: INFO

spi:
  - id: spi_bus
    clk_pin: 7
    mosi_pin: 6

output:
  - platform: ledc
    pin: GPIO47
    id: backlight_output

light:
  - platform: monochromatic
    id: led
    name: LCD Backlight
    entity_category: config
    output: backlight_output
    restore_mode: ALWAYS_ON
    default_transition_length: 50ms

i2c:
  scl: GPIO18
  sda: GPIO8

i2s_audio:
  - id: i2s_audio_bus
    i2s_lrclk_pin:
      number: GPIO45
      ignore_strapping_warning: true
    i2s_bclk_pin: GPIO17
    i2s_mclk_pin: GPIO2

audio_adc:
  - platform: es7210
    id: es7210_adc
    bits_per_sample: 16bit
    sample_rate: 16000

microphone:
  - platform: i2s_audio
    id: box_mic
    sample_rate: 16000
    i2s_din_pin: GPIO16
    bits_per_sample: 16bit
    adc_type: external

sensor:
  - platform: sound_level
    id: buddy_ears
    microphone: box_mic
    passive: false
    measurement_duration: 200ms
    rms:
      id: sound_rms
      name: "Buddy Average Volume"
      internal: true
    peak:
      id: sound_peak
      name: "Buddy Peak Volume"
      internal: true

binary_sensor:
  - platform: template
    id: is_loud_noise
    lambda: 'return id(sound_peak).state > -16.0;'
    on_press:
      then:
        - script.execute: scared_reaction

touchscreen:
  platform: gt911
  id: s3_box_touch
  address: 0x5D
  interrupt_pin:
    number: GPIO3
    ignore_strapping_warning: true
  on_touch:
    then:
      - script.execute: loved_reaction

number:
  - platform: template
    name: "Happiness Level"
    id: happiness_meter
    optimistic: true
    min_value: -100
    max_value: 100
    step: 1
    restore_value: true
    initial_value: 0
    icon: "mdi:emoticon-happy-outline"
    on_value:
      then:
        - lambda: |-
            id(MyDeskBuddy).setHappiness(id(happiness_meter).state, true, false);

select:
    - platform: template
      name: "State"
      id: state_selector
      optimistic: true
      icon: "mdi:emoticon-happy-outline"
      options:
        - "Auto"
        - "Happy"
        - "Loved"
        - "Neutral"
        - "Sad"
        - "Scared"
        - "Sleepy"
        - "Sleeping"
      on_value:
        then:
          - lambda: |-
              id(MyDeskBuddy).forceState(id(state_selector).current_option());

DeskBuddy:
  id: MyDeskBuddy

interval:
  - interval: 40ms
    then:
      - if:
          condition:
            lambda: 'return !id(MyDeskBuddy).initInProgress;'
          then:
            - component.update: s3_box_lcd
  - interval: 15min
    then:
      - lambda: 'id(MyDeskBuddy).decayHappiness();'

script:
  - id: blink_animation
    mode: parallel
    then:
      - while:
          condition:
            lambda: 'return true;'
          then:
            - delay: !lambda "return (esp_random() % 2001) + 3000;"
            - if:
                condition:
                  lambda: 'return esp_random() % 10 < 1;'
                then:
                  - lambda: 'id(MyDeskBuddy).startBlinking();'
                  - delay: 250ms
                  - lambda: 'id(MyDeskBuddy).startBlinking();'
                else:
                  - lambda: 'id(MyDeskBuddy).startBlinking();'
  - id: horizontal_move_animation
    mode: parallel
    then:
      - while:
          condition:
            lambda: 'return true;'
          then:
            - delay: !lambda "return (esp_random() % 2001) + 3000;"
            - lambda: 'id(MyDeskBuddy).startHorizontalMove();'
  - id: scared_reaction
    mode: restart
    then:
      - lambda: |-
          id(MyDeskBuddy).resetState();
          id(MyDeskBuddy).isScared = true;
          id(MyDeskBuddy).addHappiness(-10);
      - delay: 2s
      - lambda: |-
          id(MyDeskBuddy).isScared = false;
  - id: loved_reaction
    mode: restart
    then:
      - lambda: |-
          id(MyDeskBuddy).resetState();
          id(MyDeskBuddy).isLoved = true;
          id(MyDeskBuddy).addHappiness(10);
      - delay: 2s
      - lambda: |-
          id(MyDeskBuddy).isLoved = false;

display:
  - platform: ili9xxx
    id: s3_box_lcd
    model: S3BOX
    invert_colors: false
    data_rate: 40MHz
    cs_pin: 5
    dc_pin: 4
    reset_pin:
      number: 48
      inverted: true
    update_interval: never
