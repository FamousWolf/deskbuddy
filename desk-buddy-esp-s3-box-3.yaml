esphome:
  name: desk-buddy-esp-s3-box-3
  friendly_name: Desk Buddy
  on_boot:
    priority: -100
    then:
      - delay: 1s
      - lambda: 'id(init_in_progress) = false;'
      - script.execute: neutral_animation
      - display.page.show: eye_page

esp32:
  board: esp32s3box
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"

psram:
  mode: octal
  speed: 80MHz

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

ota:
  platform: esphome

api:

logger:
  level: INFO

spi:
  - id: spi_bus
    clk_pin: 7
    mosi_pin: 6

output:
  - platform: ledc
    pin: GPIO47
    id: backlight_output

light:
  - platform: monochromatic
    id: led
    name: LCD Backlight
    entity_category: config
    output: backlight_output
    restore_mode: ALWAYS_ON
    default_transition_length: 50ms

i2c:
  scl: GPIO18
  sda: GPIO8

i2s_audio:
  - id: i2s_audio_bus
    i2s_lrclk_pin:
      number: GPIO45
      ignore_strapping_warning: true
    i2s_bclk_pin: GPIO17
    i2s_mclk_pin: GPIO2

audio_adc:
  - platform: es7210
    id: es7210_adc
    bits_per_sample: 16bit
    sample_rate: 16000

microphone:
  - platform: i2s_audio
    id: box_mic
    sample_rate: 16000
    i2s_din_pin: GPIO16
    bits_per_sample: 16bit
    adc_type: external

sensor:
  - platform: sound_level
    id: buddy_ears
    microphone: box_mic
    passive: false
    measurement_duration: 200ms
    rms:
      id: sound_rms
      name: "Buddy Average Volume"
      internal: true
    peak:
      id: sound_peak
      name: "Buddy Peak Volume"
      internal: true

binary_sensor:
  - platform: template
    id: is_loud_noise
    lambda: 'return id(sound_peak).state > -16.0;'
    filters:
      - delayed_off: 500ms
    on_press:
      then:
        - if:
            condition:
              lambda: 'return !id(is_scared);'
            then:
              - script.execute: scared_reaction

globals:
  - id: init_in_progress
    type: bool
    restore_value: no
    initial_value: "true"
  - id: eye_x_target
    type: int
    initial_value: "0"
  - id: eye_x_current
    type: float
    initial_value: "0.0"
  - id: eye_height_pct
    type: float
    initial_value: "1.0"
  - id: is_petted
    type: bool
    restore_value: no
    initial_value: "false"
  - id: is_scared
    type: bool
    restore_value: no
    initial_value: "false"

number:
  - platform: template
    name: "Happiness Level"
    id: happiness_meter
    optimistic: true
    min_value: -100
    max_value: 100
    step: 1
    initial_value: 0
    icon: "mdi:emoticon-happy-outline"

interval:
  - interval: 40ms
    then:
      - if:
          condition:
            lambda: 'return !id(init_in_progress);'
          then:
            - component.update: s3_box_lcd
  - interval: 1h
    then:
      - lambda: |-
          float current = id(happiness_meter).state;
          if (current > 0) {
            id(happiness_meter).publish_state(current - 1);
          } else if (current < 0) {
            id(happiness_meter).publish_state(current + 1);
          }

script:
  - id: neutral_animation
    mode: parallel
    then:
      - while:
          condition:
            lambda: 'return true;'
          then:
            - lambda: |-
                int choice = esp_random() % 10; 
                if (choice < 3) { 
                  id(eye_animation_blink).execute();
                } else if (choice < 6) { 
                  id(eye_x_target) = (esp_random() % 81) - 40;
                }
            - delay: 2s

  - id: eye_animation_blink
    mode: restart
    then:
      - repeat:
          count: 5
          then:
            - lambda: 'id(eye_height_pct) -= 0.2;'
            - delay: 16ms
      - repeat:
          count: 5
          then:
            - lambda: 'id(eye_height_pct) += 0.2;'
            - delay: 16ms
      - lambda: 'id(eye_height_pct) = 1.0;'

  - id: pet_interaction
    mode: restart
    then:
      - lambda: 'id(is_petted) = true;'
      - component.update: s3_box_lcd
      - delay: 2s
      - lambda: 'id(is_petted) = false;'
      - component.update: s3_box_lcd

  - id: scared_reaction
    mode: restart
    then:
      - lambda: |-
          id(is_scared) = true;
          float current = id(happiness_meter).state;
          id(happiness_meter).publish_state(std::max(-100.0f, current - 15.0f));
          ESP_LOGI("scare", "Scare! Happiness: %.1f", id(happiness_meter).state);
      - component.update: s3_box_lcd
      - delay: 2s
      - lambda: 'id(is_scared) = false;'
      - component.update: s3_box_lcd

touchscreen:
  platform: gt911
  id: s3_box_touch
  address: 0x5D
  interrupt_pin:
    number: GPIO3
    ignore_strapping_warning: true
  on_touch:
    then:
      - lambda: |-
          float current = id(happiness_meter).state;
          id(happiness_meter).publish_state(std::min(100.0f, current + 5.0f));
          ESP_LOGI("touch", "Pet! Happiness: %.1f", id(happiness_meter).state);
      - script.execute: pet_interaction

display:
  - platform: ili9xxx
    id: s3_box_lcd
    model: S3BOX
    invert_colors: false
    data_rate: 40MHz
    cs_pin: 5
    dc_pin: 4
    reset_pin:
      number: 48
      inverted: true
    update_interval: never
    pages:
      - id: eye_page
        lambda: |-
          id(eye_x_current) += (id(eye_x_target) - id(eye_x_current)) * 0.15f;
          
          float happy = id(happiness_meter).state;
          float x_off = id(eye_x_current);
          int eye_w = 60;
          int eye_h = (int)(80 * id(eye_height_pct));
          int spacing = 40;
          int cx = it.get_width() / 2;
          int cy = it.get_height() / 2;
          
          Color eye_color = Color(0, 255, 255);
          Color love_color = Color(255, 50, 50);
          Color bg_color = Color(0, 0, 0);
          
          int lx = cx - spacing - eye_w + (int)x_off;
          int rx = cx + spacing + (int)x_off;
          
          // --- SCARED STATE ---
          if (id(is_scared)) {
            int jitter_x = (millis() % 12) - 6;
            int jitter_y = (millis() % 8) - 4;

            it.filled_circle(lx + 30 + jitter_x, cy + jitter_y, 12, eye_color);
            it.filled_circle(rx + 30 + jitter_x, cy + jitter_y, 12, eye_color);
          }
          // --- PETTED / LOVE STATE ---
          else if (id(is_petted)) {
            int centers[2] = {lx + 30, rx + 30};
            for (int h_cx : centers) {
               it.filled_circle(h_cx - 15, cy - 10, 15, love_color);
               it.filled_circle(h_cx + 15, cy - 10, 15, love_color);
               it.filled_triangle(h_cx - 30, cy - 5, h_cx + 30, cy - 5, h_cx, cy + 30, love_color);
            }
          }
          // --- HAPPY STATE ---
          else if (happy > 50) {
            int outer_radius = eye_w / 2;
            int inner_radius = outer_radius - 12;
            int blink_nudge = (int)(15 * (1.0f - id(eye_height_pct)));
            int active_cy = cy + blink_nudge;
            if (id(eye_height_pct) > 0.1) {
              it.filled_circle(lx + outer_radius, active_cy, outer_radius, eye_color);
              it.filled_circle(lx + outer_radius, active_cy + 4, inner_radius, bg_color);
              it.filled_rectangle(lx - 2, active_cy, eye_w + 4, outer_radius + 2, bg_color);
              it.filled_circle(rx + outer_radius, active_cy, outer_radius, eye_color);
              it.filled_circle(rx + outer_radius, active_cy + 4, inner_radius, bg_color);
              it.filled_rectangle(rx - 2, active_cy, eye_w + 4, outer_radius + 2, bg_color);
            }
          }
          // --- SAD STATE ---
          else if (happy < -50) {
            int adjusted_cy = cy + 30;
            it.filled_rectangle(lx, adjusted_cy, eye_w, eye_h / 2, eye_color);
            it.filled_triangle(lx, adjusted_cy, lx + eye_w - 1, adjusted_cy, lx + eye_w - 1, adjusted_cy - (eye_h / 2), eye_color);
            it.filled_rectangle(rx, adjusted_cy, eye_w, eye_h / 2, eye_color);
            it.filled_triangle(rx, adjusted_cy, rx + eye_w - 1, adjusted_cy, rx, adjusted_cy - (eye_h / 2), eye_color);
          }
          // --- NEUTRAL STATE ---
          else {
            it.filled_rectangle(lx, cy - (eye_h / 2), eye_w, eye_h, eye_color);
            it.filled_rectangle(rx, cy - (eye_h / 2), eye_w, eye_h, eye_color);
          }